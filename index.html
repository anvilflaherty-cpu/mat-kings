<script>
// ============================================================
// MAT KINGS — Retro Arcade Wrestling
// Tecmo Bowl meets the mat. Built by Anvil.
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Native resolution (scaled up)
const W = 320;
const H = 240;
canvas.width = W;
canvas.height = H;

// Scale to fit screen
function resize() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// AUDIO — Retro chip-tune sounds
// ============================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playSound(freq, duration, type='square', vol=0.1) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sfxSelect() { playSound(660, 0.08); playSound(880, 0.08); }
function sfxHit() { playSound(150, 0.15, 'sawtooth', 0.15); }
function sfxTakedown() { playSound(200, 0.1); playSound(100, 0.2, 'sawtooth', 0.15); }
function sfxEscape() { playSound(400, 0.08); playSound(600, 0.08); playSound(800, 0.08); }
function sfxPin() { playSound(440, 0.1); playSound(550, 0.1); playSound(660, 0.1); playSound(880, 0.3); }
function sfxWhistle() { playSound(800, 0.15, 'sine', 0.12); setTimeout(() => playSound(800, 0.3, 'sine', 0.12), 180); }
function sfxBuzz() { playSound(200, 0.4, 'sawtooth', 0.08); }

// INPUT
// ============================================================

window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ============================================================
// GAME STATE
// ============================================================
const STATES = {
  TITLE: 'title',
  SELECT: 'select',
  VERSUS: 'versus',
  MATCH_INTRO: 'match_intro',
  MOVE_SELECT: 'move_select',
  MOVE_ANIM: 'move_anim',
  RESULT: 'result',
  SCORE: 'score',
  PERIOD_END: 'period_end',
  MATCH_END: 'match_end',
  TOURNAMENT_WIN: 'tournament_win',
  GAME_OVER: 'game_over',
};

let selectedWrestler = 0;
let cursorPos = 0;
let p1Wrestler = null;
let p2Wrestler = null;
let p1Score = 0;
let p2Score = 0;
let p1Stamina = 100;
let p2Stamina = 100;
let period = 1;
let moveClock = 30; // seconds in period
let moveClockTimer = 0;
let p1Move = null;
let p2Move = null;
let animTimer = 0;
let animPhase = '';
let resultText = '';
let resultTimer = 0;
let versusTimer = 0;
let matchIntroTimer = 0;
let periodEndTimer = 0;
let matchEndTimer = 0;
let tournamentRound = 0;
let tournamentOpponents = [];
let flashTimer = 0;
let shakeTimer = 0;
let shakeX = 0;
let shakeY = 0;
let titleAnim = 0;
let p1MoveSelect = 0;
let stars = [];
let matWrestlerY = 0; // animation offset
let takedownAnim = 0;

// Tournament mode
let tournamentMode = false;

// Generate stars for title
for (let i = 0; i < 40; i++) {
  stars.push({ x: Math.random() * W, y: Math.random() * H, s: Math.random() * 2 + 0.5, b: Math.random() });
}

// ============================================================
// DRAW HELPERS
// ============================================================
function drawPixelText(text, x, y, color=C.WHITE, size=1) {
  ctx.fillStyle = color;
  ctx.font = `${8*size}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(text, x, y);
}

function drawPixelTextLeft(text, x, y, color=C.WHITE, size=1) {
  ctx.fillStyle = color;
  ctx.font = `${8*size}px monospace`;
  ctx.textAlign = 'left';
  ctx.fillText(text, x, y);
}

function drawPixelTextRight(text, x, y, color=C.WHITE, size=1) {
  ctx.fillStyle = color;
  ctx.font = `${8*size}px monospace`;
  ctx.textAlign = 'right';
  ctx.fillText(text, x, y);
}

function drawRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}

function drawOutline(x, y, w, h, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.strokeRect(Math.floor(x)+0.5, Math.floor(y)+0.5, w, h);
}

function drawStatBar(x, y, w, val, maxVal, color) {
  drawRect(x, y, w, 4, C.DARK_GRAY);
  const fillW = Math.floor((val / maxVal) * w);
  drawRect(x, y, fillW, 4, color);
}

// ============================================================
// DRAW WRESTLER SPRITE (simple pixel characters)
// ============================================================
function drawWrestlerSprite(x, y, wrestler, facing=1, frame=0, scale=2) {
  const c1 = wrestler.color;
  const c2 = wrestler.color2;
  const s = scale;
  const f = facing;

  // Body
  drawRect(x - 4*s, y - 6*s, 8*s, 6*s, c1);  // torso
  drawRect(x - 3*s, y - 8*s, 6*s, 3*s, C.SKIN); // head
  drawRect(x - 2*s, y - 8*s, 4*s, 1*s, c2);    // headgear
  
  // Eyes
  if (f === 1) {
    drawRect(x, y - 7*s, 1*s, 1*s, C.BLACK);
  } else {
    drawRect(x - 1*s, y - 7*s, 1*s, 1*s, C.BLACK);
  }
  
  // Legs
  const legOff = Math.floor(Math.sin(frame * 0.3) * 2);
  drawRect(x - 3*s, y, 2*s, 5*s + legOff, c2);  // left leg
  drawRect(x + 1*s, y, 2*s, 5*s - legOff, c2);   // right leg
  
  // Arms
  const armOff = Math.floor(Math.sin(frame * 0.3 + 1) * 2);
  drawRect(x - 6*s, y - 5*s, 2*s, 4*s + armOff, C.SKIN);  // left arm
  drawRect(x + 4*s, y - 5*s, 2*s, 4*s - armOff, C.SKIN);   // right arm
  
  // Shoes
  drawRect(x - 3*s, y + 5*s + legOff, 3*s, 1*s, C.BLACK);
  drawRect(x + 1*s, y + 5*s - legOff, 3*s, 1*s, C.BLACK);
}

function drawWrestlerDown(x, y, wrestler, facing=1, scale=2) {
  const c1 = wrestler.color;
  const c2 = wrestler.color2;
  const s = scale;
  
  // Lying flat
  drawRect(x - 6*s, y - 2*s, 12*s, 4*s, c1);  // torso horizontal
  drawRect(x + 6*s * facing - 3*s, y - 3*s, 3*s, 3*s, C.SKIN); // head
  drawRect(x + 6*s * facing - 2*s, y - 3*s, 2*s, 1*s, c2);     // headgear
  drawRect(x - 6*s, y + 2*s, 3*s, 2*s, c2);   // legs
  drawRect(x - 6*s, y - 4*s, 2*s, 2*s, C.SKIN); // arm
}

// ============================================================
// TITLE SCREEN
// ============================================================
function updateTitle() {
  titleAnim++;
  if (keys['Enter'] || keys['Space']) {
    initAudio();
    sfxSelect();
    state = STATES.SELECT;
    cursorPos = 0;
    keys['Enter'] = false;
    keys['Space'] = false;
  }
}

function drawTitle() {
  // Background
  drawRect(0, 0, W, H, C.BLACK);
  
  // Animated stars
  stars.forEach(s => {
    s.b += 0.02;
    const bright = Math.sin(s.b) * 0.5 + 0.5;
    if (bright > 0.3) {
      drawRect(s.x, s.y, s.s, s.s, bright > 0.7 ? C.YELLOW : C.LIGHT_GRAY);
    }
  });
  
  // Mat pattern at bottom
  for (let x = 0; x < W; x += 16) {
    drawRect(x, 180, 16, 60, (x/16) % 2 === 0 ? C.MAT_GREEN : C.MAT_GREEN2);
  }
  drawOutline(0, 180, W, 60, C.BRIGHT_GREEN);
  
  // Wrestling circle on mat
  ctx.beginPath();
  ctx.arc(W/2, 210, 25, 0, Math.PI * 2);
  ctx.strokeStyle = C.BRIGHT_GREEN;
  ctx.lineWidth = 1;
  ctx.stroke();
  
  // Two tiny wrestlers on mat
  drawWrestlerSprite(W/2 - 15, 205, WRESTLERS[0], 1, titleAnim, 1);
  drawWrestlerSprite(W/2 + 15, 205, WRESTLERS[1], -1, titleAnim, 1);
  
  // Title
  const yOff = Math.sin(titleAnim * 0.05) * 3;
  
  // Shadow
  drawPixelText('MAT', W/2 + 2, 52 + yOff, C.DARK_GRAY, 4);
  drawPixelText('KINGS', W/2 + 2, 92 + yOff, C.DARK_GRAY, 4);
  
  // Main title
  drawPixelText('MAT', W/2, 50 + yOff, C.GOLD, 4);
  drawPixelText('KINGS', W/2, 90 + yOff, C.BRIGHT_RED, 4);
  
  // Subtitle
  drawPixelText('ARCADE WRESTLING', W/2, 115, C.LIGHT_GRAY, 1);
  
  // Flashing press start
  if (Math.floor(titleAnim / 30) % 2 === 0) {
    drawPixelText('PRESS ENTER', W/2, 155, C.YELLOW, 1);
  }
  
  // Credits
  drawPixelText('BUILT BY ANVIL', W/2, H - 12, C.GRAY, 1);
}

// ============================================================
// CHARACTER SELECT
// ============================================================
function updateSelect() {
  if (keys['ArrowUp'] || keys['KeyW']) { cursorPos = (cursorPos - 1 + WRESTLERS.length) % WRESTLERS.length; sfxSelect(); keys['ArrowUp'] = false; keys['KeyW'] = false; }
  if (keys['ArrowDown'] || keys['KeyS']) { cursorPos = (cursorPos + 1) % WRESTLERS.length; sfxSelect(); keys['ArrowDown'] = false; keys['KeyS'] = false; }
  if (keys['Enter'] || keys['Space']) {
    sfxSelect();
    p1Wrestler = WRESTLERS[cursorPos];
    selectedWrestler = cursorPos;
    
    // Set up tournament
    tournamentOpponents = WRESTLERS.filter((_, i) => i !== cursorPos).sort(() => Math.random() - 0.5);
    tournamentRound = 0;
    p2Wrestler = tournamentOpponents[0];
    
    // Reset match
    p1Score = 0; p2Score = 0; p1Stamina = 100; p2Stamina = 100;
    period = 1; moveClock = 30;
    
    state = STATES.VERSUS;
    versusTimer = 120;
    keys['Enter'] = false; keys['Space'] = false;
  }
}

function drawSelect() {
  drawRect(0, 0, W, H, C.BLACK);
  
  drawPixelText('SELECT YOUR WRESTLER', W/2, 16, C.GOLD, 1);
  
  WRESTLERS.forEach((w, i) => {
    const y = 32 + i * 30;
    const selected = i === cursorPos;
    
    // Highlight box
    if (selected) {
      drawRect(16, y - 4, W - 32, 26, w.color2);
      drawOutline(16, y - 4, W - 32, 26, w.color);
    }
    
    // Name and school
    drawPixelTextLeft(w.name, 24, y + 8, selected ? C.WHITE : C.LIGHT_GRAY, 1);
    drawPixelTextRight(w.school, W - 24, y + 2, C.GRAY, 1);
    
    // Stats
    const sx = W - 24;
    drawPixelTextRight(`STR:${w.str} SPD:${w.spd} TEC:${w.tec}`, sx, y + 16, C.GRAY, 1);
    
    // Mini wrestler
    drawWrestlerSprite(12, y + 6, w, 1, 0, 1);
  });
  
  // Preview of selected wrestler
  if (WRESTLERS[cursorPos]) {
    const w = WRESTLERS[cursorPos];
    drawWrestlerSprite(W/2, H - 30, w, 1, titleAnim++, 2);
  }
  
  drawPixelText('ENTER TO SELECT', W/2, H - 8, C.YELLOW, 1);
}

// ============================================================
// VERSUS SCREEN
// ============================================================
function updateVersus() {
  versusTimer--;
  if (versusTimer <= 0) {
    state = STATES.MATCH_INTRO;
    matchIntroTimer = 90;
    sfxWhistle();
  }
}

function drawVersus() {
  drawRect(0, 0, W, H, C.BLACK);
  
  // VS flash
  const flash = versusTimer > 60;
  
  // P1 side
  drawPixelText(p1Wrestler.name, 80, 50, p1Wrestler.color, 2);
  drawWrestlerSprite(80, 110, p1Wrestler, 1, titleAnim++, 2);
  drawPixelText(p1Wrestler.school, 80, 135, C.LIGHT_GRAY, 1);
  
  // P2 side
  drawPixelText(p2Wrestler.name, W - 80, 50, p2Wrestler.color, 2);
  drawWrestlerSprite(W - 80, 110, p2Wrestler, -1, titleAnim++, 2);
  drawPixelText(p2Wrestler.school, W - 80, 135, C.LIGHT_GRAY, 1);
  
  // VS
  if (flash || Math.floor(versusTimer / 5) % 2 === 0) {
    drawPixelText('VS', W/2, 90, C.YELLOW, 3);
  }
  
  // Round info
  drawPixelText(`ROUND ${tournamentRound + 1}`, W/2, 165, C.GOLD, 1);
}

// ============================================================
// MATCH INTRO
// ============================================================
function updateMatchIntro() {
  matchIntroTimer--;
  if (matchIntroTimer <= 0) {
    state = STATES.MOVE_SELECT;
    p1MoveSelect = 0;
    moveClock = 30;
    moveClockTimer = 0;
  }
}

function drawMatchIntro() {
  drawMatch();
  
  // Overlay
  drawRect(0, 0, W, H, 'rgba(0,0,0,0.6)');
  
  const t = matchIntroTimer;
  if (t > 60) {
    drawPixelText('PERIOD ' + period, W/2, 100, C.GOLD, 2);
  } else if (t > 30) {
    drawPixelText('WRESTLE!', W/2, 100, C.BRIGHT_RED, 3);
  }
}

// ============================================================
// MATCH SCREEN (background)
// ============================================================
function drawMatch() {
  // Mat
  for (let x = 0; x < W; x += 32) {
    for (let y = 30; y < H; y += 32) {
      const shade = ((x/32 + y/32) % 2 === 0) ? C.MAT_GREEN : C.MAT_GREEN2;
      drawRect(x, y, 32, 32, shade);
    }
  }
  
  // Mat outline
  drawOutline(0, 30, W, H - 30, C.BRIGHT_GREEN);
  
  // Center circle
  ctx.beginPath();
  ctx.arc(W/2, H/2 + 15, 40, 0, Math.PI * 2);
  ctx.strokeStyle = C.BRIGHT_GREEN;
  ctx.lineWidth = 1;
  ctx.stroke();
  
  // Scoreboard
  drawRect(0, 0, W, 30, C.BLACK);
  
  // P1 info
  drawPixelTextLeft(p1Wrestler.name, 4, 12, p1Wrestler.color, 1);
  drawPixelTextLeft(`${p1Score}`, 4, 24, C.WHITE, 1);
  drawStatBar(70, 6, 60, p1Stamina, 100, p1Wrestler.color);
  
  // P2 info
  drawPixelTextRight(p2Wrestler.name, W - 4, 12, p2Wrestler.color, 1);
  drawPixelTextRight(`${p2Score}`, W - 4, 24, C.WHITE, 1);
  drawStatBar(W - 130, 6, 60, p2Stamina, 100, p2Wrestler.color);
  
  // Clock
  drawPixelText(`${moveClock}`, W/2, 22, C.YELLOW, 2);
  drawPixelText(`P${period}`, W/2, 10, C.LIGHT_GRAY, 1);
  
  // Round indicator
  drawPixelText(`R${tournamentRound + 1}`, W/2, H - 4, C.GRAY, 1);
}

// ============================================================
// MOVE SELECT
// ============================================================
function updateMoveSelect() {
  if (keys['ArrowUp'] || keys['KeyW']) { p1MoveSelect = (p1MoveSelect - 1 + 4) % 4; sfxSelect(); keys['ArrowUp'] = false; keys['KeyW'] = false; }
  if (keys['ArrowDown'] || keys['KeyS']) { p1MoveSelect = (p1MoveSelect + 1) % 4; sfxSelect(); keys['ArrowDown'] = false; keys['KeyS'] = false; }
  
  // Clock ticks
  moveClockTimer++;
  if (moveClockTimer >= 60) {
    moveClockTimer = 0;
    moveClock--;
    if (moveClock <= 0) {
      // Time's up - random move
      resolveMove(p1MoveSelect);
      return;
    }
  }
  
  if (keys['Enter'] || keys['Space']) {
    resolveMove(p1MoveSelect);
    keys['Enter'] = false; keys['Space'] = false;
  }
}

function resolveMove(p1Idx) {
  p1Move = p1Wrestler.moves[p1Idx];
  
  // AI picks move
  const aiIdx = Math.floor(Math.random() * 4);
  p2Move = p2Wrestler.moves[aiIdx];
  
  state = STATES.MOVE_ANIM;
  animTimer = 60;
  animPhase = 'clash';
  takedownAnim = 0;
}

function updateMoveAnim() {
  animTimer--;
  
  if (animPhase === 'clash') {
    // Shaking / tension
    shakeTimer = 3;
    shakeX = (Math.random() - 0.5) * 4;
    shakeY = (Math.random() - 0.5) * 4;
    
    if (animTimer <= 0) {
      animPhase = 'execute';
      animTimer = 45;
      takedownAnim = 0;
      
      // Determine outcome
      const outcome = resolveOutcome(p1Move, p2Move, p1Wrestler, p2Wrestler);
      resultText = outcome.text;
      // Apply result
      if (outcome.winner === 'p1') {
        p1Score += outcome.points;
        p2Stamina = Math.max(0, p2Stamina - outcome.damage);
        sfxTakedown();
      } else if (outcome.winner === 'p2') {
        p2Score += outcome.points;
        p1Stamina = Math.max(0, p1Stamina - outcome.damage);
        sfxHit();
      } else {
        sfxEscape();
      }
    }
  } else if (animPhase === 'execute') {
    takedownAnim++;
    
    if (animTimer <= 0) {
      animPhase = 'result';
      animTimer = 60;
      resultTimer = 60;
    }
  } else if (animPhase === 'result') {
    if (animTimer <= 0) {
      // Check for pin / KO
      if (p1Stamina <= 0 || p2Stamina <= 0) {
        // Pin!
        sfxPin();
        if (p2Stamina <= 0) {
          p1Score += 6;
          resultText = 'PIN! ' + p1Wrestler.name + ' WINS!';
        } else {
          p2Score += 6;
          resultText = 'PIN! ' + p2Wrestler.name + ' WINS!';
        }
        state = STATES.MATCH_END;
        matchEndTimer = 150;
        return;
      }
      
      // Check period end
      if (moveClock <= 0) {
        state = STATES.PERIOD_END;
        periodEndTimer = 90;
        return;
      }
      
      state = STATES.MOVE_SELECT;
      p1MoveSelect = 0;
    }
  }
}

function resolveOutcome(m1, m2, w1, w2) {
  // Type matchups (Tecmo Bowl style)
  // defense beats takedown
  // takedown beats throw  
  // throw beats pin
  // pin beats defense (catches them off guard)
  
  let p1Advantage = 0;
  
  if (m1.type === 'defense' && m2.type === 'takedown') p1Advantage = 2;
  else if (m1.type === 'takedown' && m2.type === 'defense') p1Advantage = -2;
  else if (m1.type === 'takedown' && m2.type === 'throw') p1Advantage = 2;
  else if (m1.type === 'throw' && m2.type === 'takedown') p1Advantage = -2;
  else if (m1.type === 'throw' && m2.type === 'pin') p1Advantage = 2;
  else if (m1.type === 'pin' && m2.type === 'throw') p1Advantage = -2;
  else if (m1.type === 'pin' && m2.type === 'defense') p1Advantage = 2;
  else if (m1.type === 'defense' && m2.type === 'pin') p1Advantage = -2;
  else p1Advantage = 0; // same type = neutral
  
  // Add stat differences and move power
  if (m1.type === 'takedown') p1Advantage += (w1.str - w2.spd) * 0.3;
  else if (m1.type === 'throw') p1Advantage += (w1.tec - w2.str) * 0.3;
  else if (m1.type === 'pin') p1Advantage += (w1.tec - w2.spd) * 0.3;
  else if (m1.type === 'defense') p1Advantage += (w1.spd - w2.str) * 0.3;
  
  p1Advantage += (m1.power - m2.power) * 0.2;
  p1Advantage += (Math.random() - 0.5) * 2; // variance
  
  // Stamina factor
  p1Advantage += (p1Stamina - p2Stamina) * 0.02;
  
  if (p1Advantage > 1.5) {
    return { winner: 'p1', points: 2, damage: 15, text: m1.name + '!' };
  } else if (p1Advantage > 0.5) {
    return { winner: 'p1', points: 1, damage: 8, text: m1.name + ' - partial!' };
  } else if (p1Advantage > -0.5) {
    return { winner: 'none', points: 0, damage: 0, text: 'STALEMATE!' };
  } else if (p1Advantage > -1.5) {
    return { winner: 'p2', points: 1, damage: 8, text: m2.name + ' - partial!' };
  } else {
    return { winner: 'p2', points: 2, damage: 15, text: m2.name + '!' };
  }
}

function drawMoveSelect() {
  drawMatch();
  
  // Wrestlers on mat
  drawWrestlerSprite(W/2 - 30, H/2 + 10, p1Wrestler, 1, titleAnim++, 2);
  drawWrestlerSprite(W/2 + 30, H/2 + 10, p2Wrestler, -1, titleAnim++, 2);
  
  // Move selection panel at bottom
  drawRect(0, H - 52, W, 52, C.BLACK);
  drawOutline(0, H - 52, W, 52, C.GOLD);
  
  drawPixelText('PICK YOUR MOVE', W/2, H - 46, C.GOLD, 1);
  
  p1Wrestler.moves.forEach((m, i) => {
    const x = 10 + i * 78;
    const y = H - 36;
    const selected = i === p1MoveSelect;
    
    if (selected) {
      drawRect(x - 2, y - 2, 74, 22, m.type === 'takedown' ? C.BRIGHT_RED : m.type === 'throw' ? C.BRIGHT_BLUE : m.type === 'pin' ? C.BRIGHT_GREEN : C.YELLOW);
      drawOutline(x - 2, y - 2, 74, 22, C.WHITE);
    }
    
    const bgColor = selected ? C.BLACK : C.DARK_GRAY;
    drawRect(x, y, 70, 18, bgColor);
    drawPixelText(m.icon, x + 10, y + 8, selected ? C.WHITE : C.GRAY, 1);
    drawPixelTextLeft(m.name, x + 24, y + 8, selected ? C.WHITE : C.GRAY, 1);
  });
  
  // Arrow indicator
  const arrowX = 10 + p1MoveSelect * 78 + 35;
  if (Math.floor(titleAnim / 15) % 2 === 0) {
    drawPixelText('^', arrowX, H - 52, C.YELLOW, 1);
  }
}

function drawMoveAnim() {
  drawMatch();
  
  // Apply screen shake
  if (shakeTimer > 0) {
    ctx.save();
    ctx.translate(shakeX, shakeY);
    shakeTimer--;
  }
  
  if (animPhase === 'clash') {
    // Both wrestlers bouncing/shaking
    const shake = Math.sin(animTimer * 0.5) * 3;
    drawWrestlerSprite(W/2 - 25 + shake, H/2 + 10, p1Wrestler, 1, animTimer, 2);
    drawWrestlerSprite(W/2 + 25 - shake, H/2 + 10, p2Wrestler, -1, animTimer, 2);
    
    // Move names flash
    drawPixelText(p1Move.name, W/2 - 60, H/2 - 20, p1Wrestler.color, 1);
    drawPixelText(p2Move.name, W/2 + 60, H/2 - 20, p2Wrestler.color, 1);
    
    // Explosion effect
    if (animTimer < 15) {
      drawPixelText('!!', W/2, H/2 - 5, C.YELLOW, 2);
    }
  } else if (animPhase === 'execute') {
    const progress = takedownAnim / 45;
    
    if (resultText.includes(p1Wrestler.moves[0].name) || resultText.includes(p1Wrestler.moves[1].name) || resultText.includes(p1Wrestler.moves[2].name) || resultText.includes(p1Wrestler.moves[3].name)) {
      // P1 wins - P2 goes down
      drawWrestlerSprite(W/2, H/2 + 10 - progress * 5, p1Wrestler, 1, 0, 2);
      if (progress > 0.3) {
        drawWrestlerDown(W/2 + 20, H/2 + 15 + progress * 10, p2Wrestler, 1, 2);
      } else {
        drawWrestlerSprite(W/2 + 30, H/2 + 10 + progress * 15, p2Wrestler, -1, 0, 2);
      }
    } else if (resultText === 'STALEMATE!') {
      // Both push back
      drawWrestlerSprite(W/2 - 25 - progress * 15, H/2 + 10, p1Wrestler, 1, 0, 2);
      drawWrestlerSprite(W/2 + 25 + progress * 15, H/2 + 10, p2Wrestler, -1, 0, 2);
    } else {
      // P2 wins - P1 goes down
      drawWrestlerSprite(W/2, H/2 + 10 - progress * 5, p2Wrestler, -1, 0, 2);
      if (progress > 0.3) {
        drawWrestlerDown(W/2 - 20, H/2 + 15 + progress * 10, p1Wrestler, -1, 2);
      } else {
        drawWrestlerSprite(W/2 - 30, H/2 + 10 + progress * 15, p1Wrestler, 1, 0, 2);
      }
    }
  } else if (animPhase === 'result') {
    // Show result
    drawWrestlerSprite(W/2 - 25, H/2 + 10, p1Wrestler, 1, 0, 2);
    drawWrestlerSprite(W/2 + 25, H/2 + 10, p2Wrestler, -1, 0, 2);
    
    // Result banner
    const bannerColor = resultText.includes('!') && !resultText.includes('STALEMATE') ? C.GOLD : C.LIGHT_GRAY;
    drawRect(W/2 - 70, H/2 - 30, 140, 20, C.BLACK);
    drawOutline(W/2 - 70, H/2 - 30, 140, 20, bannerColor);
    drawPixelText(resultText, W/2, H/2 - 18, bannerColor, 1);
    
    // Points flash
    if (resultTimer > 30 && Math.floor(resultTimer / 5) % 2 === 0) {
      drawPixelText('+2', W/2 - 60, H/2 - 10, C.YELLOW, 1);
    }
    resultTimer--;
  }
  
  if (shakeTimer > 0) {
    ctx.restore();
  }
}

// ============================================================
// PERIOD END
// ============================================================
function updatePeriodEnd() {
  periodEndTimer--;
  if (periodEndTimer <= 0) {
    period++;
    if (period > 3) {
      // Match over - decide winner
      state = STATES.MATCH_END;
      matchEndTimer = 150;
      if (p1Score > p2Score) {
        resultText = p1Wrestler.name + ' WINS BY DECISION!';
      } else if (p2Score > p1Score) {
        resultText = p2Wrestler.name + ' WINS BY DECISION!';
      } else {
        resultText = 'DRAW!';
      }
    } else {
      moveClock = 30;
      moveClockTimer = 0;
      state = STATES.MATCH_INTRO;
      matchIntroTimer = 90;
      sfxWhistle();
    }
  }
}

function drawPeriodEnd() {
  drawMatch();
  drawRect(0, 0, W, H, 'rgba(0,0,0,0.7)');
  
  sfxBuzz();
  
  drawPixelText('END OF PERIOD ' + (period), W/2, H/2 - 20, C.GOLD, 2);
  drawPixelText(p1Wrestler.name + ': ' + p1Score + '  ' + p2Wrestler.name + ': ' + p2Score, W/2, H/2 + 10, C.WHITE, 1);
}

// ============================================================
// MATCH END
// ============================================================
function updateMatchEnd() {
  matchEndTimer--;
  if (matchEndTimer <= 0) {
    const p1Won = p1Score > p2Score;
    
    if (p1Won) {
      // Next round
      tournamentRound++;
      if (tournamentRound >= tournamentOpponents.length) {
        state = STATES.TOURNAMENT_WIN;
        return;
      }
      p2Wrestler = tournamentOpponents[tournamentRound];
      p1Score = 0; p2Score = 0; p1Stamina = 100; p2Stamina = 100;
      period = 1; moveClock = 30;
      state = STATES.VERSUS;
      versusTimer = 120;
    } else {
      state = STATES.GAME_OVER;
    }
  }
}

function drawMatchEnd() {
  drawMatch();
  drawRect(0, 0, W, H, 'rgba(0,0,0,0.7)');
  
  const winner = p1Score > p2Score ? p1Wrestler : p2Wrestler;
  const flash = Math.floor(matchEndTimer / 8) % 2 === 0;
  
  drawPixelText(resultText, W/2, H/2 - 20, flash ? C.GOLD : C.YELLOW, 1);
  drawPixelText(winner.name + ' WINS!', W/2, H/2 + 10, winner.color, 2);
  
  drawPixelText(p1Wrestler.name + ': ' + p1Score + '  ' + p2Wrestler.name + ': ' + p2Score, W/2, H/2 + 35, C.WHITE, 1);
}

// ============================================================
// TOURNAMENT WIN
// ============================================================
function drawTournamentWin() {
  drawRect(0, 0, W, H, C.BLACK);
  
  // Celebration
  const t = titleAnim++;
  for (let i = 0; i < 5; i++) {
    const px = Math.sin(t * 0.02 + i) * 100 + W/2;
    const py = Math.cos(t * 0.03 + i * 2) * 80 + H/2;
    drawRect(px, py, 4, 4, [C.GOLD, C.BRIGHT_RED, C.BRIGHT_BLUE, C.BRIGHT_GREEN, C.YELLOW][i]);
  }
  
  drawPixelText('CHAMPION!', W/2, 40, C.GOLD, 3);
  drawPixelText(p1Wrestler.name, W/2, 80, p1Wrestler.color, 2);
  drawPixelText('MAT KING', W/2, 105, C.YELLOW, 2);
  
  drawWrestlerSprite(W/2, 150, p1Wrestler, 1, t, 2);
  
  // Trophy
  drawRect(W/2 - 6, 130, 12, 8, C.GOLD);
  drawRect(W/2 - 3, 138, 6, 4, C.GOLD);
  drawRect(W/2 - 8, 128, 16, 4, C.GOLD);
  
  if (Math.floor(t / 30) % 2 === 0) {
    drawPixelText('PRESS ENTER', W/2, H - 15, C.WHITE, 1);
  }
  
  if (keys['Enter'] || keys['Space']) {
    state = STATES.TITLE;
    keys['Enter'] = false; keys['Space'] = false;
  }
}

// ============================================================
// GAME OVER
// ============================================================
function drawGameOver() {
  drawRect(0, 0, W, H, C.BLACK);
  
  drawPixelText('ELIMINATED', W/2, 60, C.BRIGHT_RED, 2);
  drawPixelText(p1Wrestler.name + ' LOSES', W/2, 90, C.LIGHT_GRAY, 1);
  drawPixelText('ROUND ' + (tournamentRound + 1) + ' OF ' + tournamentOpponents.length, W/2, 110, C.GRAY, 1);
  
  drawPixelText('FINAL SCORE: ' + p1Score + ' - ' + p2Score, W/2, 140, C.WHITE, 1);
  
  if (Math.floor(titleAnim++ / 30) % 2 === 0) {
    drawPixelText('PRESS ENTER', W/2, H - 30, C.YELLOW, 1);
  }
  
  if (keys['Enter'] || keys['Space']) {
    state = STATES.TITLE;
    keys['Enter'] = false; keys['Space'] = false;
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
function update() {
  switch (state) {
    case STATES.TITLE: updateTitle(); break;
    case STATES.SELECT: updateSelect(); break;
    case STATES.VERSUS: updateVersus(); break;
    case STATES.MATCH_INTRO: updateMatchIntro(); break;
    case STATES.MOVE_SELECT: updateMoveSelect(); break;
    case STATES.MOVE_ANIM: updateMoveAnim(); break;
    case STATES.PERIOD_END: updatePeriodEnd(); break;
    case STATES.MATCH_END: updateMatchEnd(); break;
  }
}

function draw() {
  // Clear
  ctx.fillStyle = C.BLACK;
  ctx.fillRect(0, 0, W, H);
  
  switch (state) {
    case STATES.TITLE: drawTitle(); break;
    case STATES.SELECT: drawSelect(); break;
    case STATES.VERSUS: drawVersus(); break;
    case STATES.MATCH_INTRO: drawMatchIntro(); break;
    case STATES.MOVE_SELECT: drawMoveSelect(); break;
    case STATES.MOVE_ANIM: drawMoveAnim(); break;
    case STATES.PERIOD_END: drawPeriodEnd(); break;
    case STATES.MATCH_END: drawMatchEnd(); break;
    case STATES.TOURNAMENT_WIN: drawTournamentWin(); break;
    case STATES.GAME_OVER: drawGameOver(); break;
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Start
titleAnim = 0;
gameLoop();
</script>
