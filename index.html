<title>MAT KINGS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0F0F0F; width: 100%; height: 100%; overflow: hidden; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  canvas { image-rendering: pixelated; image-rendering: crisp-edges; display: block; touch-action: none; }
</style>

<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Portrait resolution for mobile
const W = 360;
const H = 640;
canvas.width = W;
canvas.height = H;

function resize() {
  const sw = window.innerWidth;
  const sh = window.innerHeight;
  const scale = Math.min(sw / W, sh / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  canvas.style.position = 'absolute';
  canvas.style.left = ((sw - W * scale) / 2) + 'px';
  canvas.style.top = ((sh - H * scale) / 2) + 'px';
}
resize();
window.addEventListener('resize', resize);

// Audio
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
function playSound(freq, dur, type='square', vol=0.1) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  g.gain.setValueAtAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxSelect() { playSound(660, 0.08); playSound(880, 0.08); }
function sfxHit() { playSound(150, 0.15, 'sawtooth', 0.15); }
function sfxTakedown() { playSound(200, 0.1); playSound(100, 0.2, 'sawtooth', 0.15); }
function sfxEscape() { playSound(400, 0.08); playSound(600, 0.08); playSound(800, 0.08); }
function sfxPin() { playSound(440, 0.1); playSound(550, 0.1); playSound(660, 0.1); playSound(880, 0.3); }
function sfxWhistle() { playSound(800, 0.15, 'sine', 0.12); setTimeout(() => playSound(800, 0.3, 'sine', 0.12), 180); }
function sfxBuzz() { playSound(200, 0.4, 'sawtooth', 0.08); }

// Input
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch system
let touchAreas = [];
let touchHit = null;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  for (let t of e.changedTouches) {
    const tx = (t.clientX - rect.left) * scaleX;
    const ty = (t.clientY - rect.top) * scaleY;
    for (let i = touchAreas.length - 1; i >= 0; i--) {
      const a = touchAreas[i];
      if (tx >= a.x && tx <= a.x + a.w && ty >= a.y && ty <= a.y + a.h) {
        touchHit = a.id;
        break;
      }
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => { e.preventDefault(); }, { passive: false });

function consumeTouch() {
  const t = touchHit;
  touchHit = null;
  return t;
}

function addTouch(id, x, y, w, h) {
  touchAreas.push({ id, x, y, w, h });
}

// Colors — USA Wrestling palette
const C = {

  RED: '#B22234', BRIGHT_RED: '#E44028', DARK_RED: '#8B0000',
  BLUE: '#002868', BRIGHT_BLUE: '#3C5A99', NAVY: '#001F5B',
  GREEN: '#00A800', BRIGHT_GREEN: '#58F898',

  MAT_RED: '#9B2335', MAT_BLUE: '#1A3C6E',
  MAT_CENTER: '#FCFCFC',
  PURPLE: '#6828B8', CYAN: '#00E8D8',
};

// Wrestlers
const WRESTLERS = [
  { name: 'IRON MIKE', school: 'Lincoln HS', state: 'IA', color: C.BRIGHT_RED, color2: C.DARK_RED, singlet: C.BRIGHT_RED, str: 9, spd: 5, tec: 6, sta: 8,
    moves: [

    ]},
  { name: 'LIGHTNING LEE', school: 'Central HS', state: 'PA', color: C.BRIGHT_BLUE, color2: C.NAVY, singlet: C.BRIGHT_BLUE, str: 4, spd: 9, tec: 8, sta: 5,
    moves: [
      { name: 'SINGLE LEG', type: 'takedown', power: 7, beat: 'grapple', icon: 'SL', pts: 2 },
      { name: 'ARM THROW', type: 'throw', power: 6, beat: 'takedown', icon: 'AT', pts: 2 },
      { name: 'CRADLE', type: 'pin', power: 8, beat: 'throw', icon: 'CR', pts: 3 },
      { name: 'ESCAPE', type: 'defense', power: 8, beat: 'takedown', icon: 'ES', pts: 1 },
    ]},
  { name: 'THE BULL', school: 'Riverside HS', state: 'OH', color: C.ORANGE, color2: C.BROWN, singlet: C.ORANGE, str: 10, spd: 3, tec: 4, sta: 9,
    moves: [
      { name: 'FIREMAN', type: 'takedown', power: 10, beat: 'grapple', icon: 'FM', pts: 2 },
      { name: 'BODY SLAM', type: 'throw', power: 9, beat: 'takedown', icon: 'BS', pts: 2 },
      { name: 'BEAR HUG', type: 'pin', power: 6, beat: 'throw', icon: 'BH', pts: 3 },
      { name: 'SHRUG', type: 'defense', power: 6, beat: 'takedown', icon: 'SH', pts: 1 },
    ]},
  { name: 'COBRA KAI', school: 'Eastside HS', state: 'CA', color: C.BRIGHT_GREEN, color2: C.GREEN, singlet: C.BRIGHT_GREEN, str: 6, spd: 7, tec: 9, sta: 6,
    moves: [
      { name: 'ANKLE PICK', type: 'takedown', power: 7, beat: 'grapple', icon: 'AP', pts: 2 },
      { name: 'HEADLOCK', type: 'throw', power: 7, beat: 'takedown', icon: 'HL', pts: 2 },
      { name: 'GUILLOTINE', type: 'pin', power: 9, beat: 'throw', icon: 'GT', pts: 3 },
      { name: 'REVERSAL', type: 'defense', power: 9, beat: 'takedown', icon: 'RV', pts: 2 },
    ]},
  { name: 'THUNDER HAWK', school: 'Westfield HS', state: 'OK', color: C.YELLOW, color2: C.BROWN, singlet: C.YELLOW, str: 7, spd: 6, tec: 7, sta: 7,
    moves: [
      { name: 'HIGH CROTCH', type: 'takedown', power: 8, beat: 'grapple', icon: 'HC', pts: 2 },
      { name: 'DUCK UNDER', type: 'throw', power: 7, beat: 'takedown', icon: 'DU', pts: 2 },
      { name: 'TILT', type: 'pin', power: 8, beat: 'throw', icon: 'TL', pts: 3 },
      { name: 'STANDUP', type: 'defense', power: 7, beat: 'takedown', icon: 'SU', pts: 1 },
    ]},
  { name: 'SHADOW', school: 'State Champ', state: 'USA', color: C.PURPLE, color2: C.DARK_GRAY, singlet: C.PURPLE, str: 8, spd: 8, tec: 8, sta: 8,
    moves: [
      { name: 'BLAST DOUBLE', type: 'takedown', power: 9, beat: 'grapple', icon: 'BD', pts: 2 },
      { name: 'SUPLEX', type: 'throw', power: 9, beat: 'takedown', icon: 'SX', pts: 2 },
      { name: 'STICKBACK', type: 'pin', power: 9, beat: 'throw', icon: 'SB', pts: 3 },
      { name: 'COUNTER', type: 'defense', power: 9, beat: 'takedown', icon: 'CT', pts: 2 },
    ]},
];

// Game State
const STATES = { TITLE:'title', SELECT:'select', VERSUS:'versus', MATCH_INTRO:'match_intro', MOVE_SELECT:'move_select', MOVE_ANIM:'move_anim', RESULT:'result', SCORE:'score', PERIOD_END:'period_end', MATCH_END:'match_end', TOURNAMENT_WIN:'tournament_win', GAME_OVER:'game_over' };

let state = STATES.TITLE, selectedWrestler = 0, cursorPos = 0;
let p1Wrestler = null, p2Wrestler = null;
let p1Score = 0, p2Score = 0, p1Stamina = 100, p2Stamina = 100;
let period = 1, moveClock = 30, moveClockTimer = 0;
let p1Move = null, p2Move = null;
let animTimer = 0, animPhase = '', resultText = '', resultTimer = 0;
let versusTimer = 0, matchIntroTimer = 0, periodEndTimer = 0, matchEndTimer = 0;
let tournamentRound = 0, tournamentOpponents = [];
let flashTimer = 0, shakeTimer = 0, shakeX = 0, shakeY = 0;
let titleAnim = 0, p1MoveSelect = 0, takedownAnim = 0;
let stars = [];
for (let i = 0; i < 50; i++) stars.push({ x: Math.random() * W, y: Math.random() * H, s: Math.random() * 2 + 0.5, b: Math.random() });
let selectScroll = 0;

// Draw helpers
function txt(text, x, y, color=C.WHITE, size=1) { ctx.fillStyle = color; ctx.font = `${8*size}px monospace`; ctx.textAlign = 'center'; ctx.fillText(text, x, y); }
function txtL(text, x, y, color=C.WHITE, size=1) { ctx.fillStyle = color; ctx.font = `${8*size}px monospace`; ctx.textAlign = 'left'; ctx.fillText(text, x, y); }
function txtR(text, x, y, color=C.WHITE, size=1) { ctx.fillStyle = color; ctx.font = `${8*size}px monospace`; ctx.textAlign = 'right'; ctx.fillText(text, x, y); }
function rect(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(Math.floor(x), Math.floor(y), w, h); }
function outline(x, y, w, h, c) { ctx.strokeStyle = c; ctx.lineWidth = 1; ctx.strokeRect(Math.floor(x)+0.5, Math.floor(y)+0.5, w, h); }

// Draw wrestler sprite — more wrestling-like
function drawWrestler(x, y, w, facing=1, frame=0, sc=2) {
  const c1 = w.singlet || w.color;
  const c2 = w.color2;
  const s = sc;
  // Head
  rect(x - 3*s, y - 12*s, 6*s, 5*s, C.SKIN);
  // Headgear
  rect(x - 4*s, y - 12*s, 2*s, 4*s, c1);
  rect(x + 2*s, y - 12*s, 2*s, 4*s, c1);
  rect(x - 3*s, y - 13*s, 6*s, 2*s, c1);
  // Eye
  rect(x + (facing===1 ? 1 : -2)*s, y - 10*s, 1*s, 1*s, C.BLACK);
  // Neck
  rect(x - 1*s, y - 7*s, 2*s, 1*s, C.SKIN);
  // Torso (singlet)
  rect(x - 5*s, y - 6*s, 10*s, 8*s, c1);
  // Singlet stripe
  rect(x - 1*s, y - 6*s, 2*s, 8*s, c2);
  // Arms
  const ao = Math.floor(Math.sin(frame * 0.3 + 1) * 2);
  rect(x - 7*s, y - 5*s, 2*s, 5*s + ao, C.SKIN);
  rect(x + 5*s, y - 5*s, 2*s, 5*s - ao, C.SKIN);
  // Legs
  const lo = Math.floor(Math.sin(frame * 0.3) * 2);
  rect(x - 4*s, y + 2*s, 3*s, 5*s + lo, c2);
  rect(x + 1*s, y + 2*s, 3*s, 5*s - lo, c2);
  // Wrestling shoes
  rect(x - 4*s, y + 7*s + lo, 4*s, 2*s, C.WHITE);
  rect(x + 1*s, y + 7*s - lo, 4*s, 2*s, C.WHITE);
  rect(x - 4*s, y + 7*s + lo, 4*s, 1*s, c1);
  rect(x + 1*s, y + 7*s - lo, 4*s, 1*s, c1);
}

function drawWrestlerDown(x, y, w, facing=1, sc=2) {
  const c1 = w.singlet || w.color, c2 = w.color2, s = sc;
  rect(x - 8*s, y - 2*s, 16*s, 5*s, c1);
  rect(x + 8*s * facing - 4*s, y - 4*s, 4*s, 4*s, C.SKIN);
  rect(x + 8*s * facing - 3*s, y - 4*s, 3*s, 2*s, c1);
  rect(x - 8*s, y + 3*s, 4*s, 3*s, c2);
  rect(x - 8*s, y + 5*s, 4*s, 1*s, C.WHITE);
  rect(x - 10*s, y - 4*s, 3*s, 3*s, C.SKIN);
}

// Draw competition mat
function drawMat() {
  // Mat base - blue competition mat
  rect(0, 60, W, H - 60, C.MAT_BLUE);
  
  // 10m circle
  ctx.beginPath();
  ctx.arc(W/2, H/2 + 30, 130, 0, Math.PI * 2);
  ctx.strokeStyle = C.WHITE;
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // Inner circle
  ctx.beginPath();
  ctx.arc(W/2, H/2 + 30, 100, 0, Math.PI * 2);
  ctx.strokeStyle = C.MAT_RED;
  ctx.lineWidth = 3;
  ctx.stroke();
  
  // Center circle
  ctx.beginPath();
  ctx.arc(W/2, H/2 + 30, 20, 0, Math.PI * 2);
  ctx.strokeStyle = C.WHITE;
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // Center dot
  ctx.beginPath();
  ctx.arc(W/2, H/2 + 30, 3, 0, Math.PI * 2);
  ctx.fillStyle = C.WHITE;
  ctx.fill();
  
  // Red zone corner indicators
  rect(10, 65, 30, 20, C.MAT_RED);
  txt('RED', 25, 79, C.WHITE, 1);
  rect(W - 40, 65, 30, 20, C.MAT_RED);
  txt('BLU', W - 25, 79, C.WHITE, 1);
  
  // Boundary line
  outline(4, 64, W - 8, H - 68, C.WHITE);
}

// Scoreboard
function drawScoreboard() {
  rect(0, 0, W, 58, C.BLACK);
  outline(0, 0, W, 58, C.GOLD);
  
  // P1
  txtL(p1Wrestler.name, 8, 16, p1Wrestler.color, 1);
  txtL('' + p1Score, 8, 36, C.WHITE, 2);
  // Stamina bar
  rect(8, 44, 120, 6, C.DARK_GRAY);
  rect(8, 44, Math.floor(p1Stamina * 1.2), 6, p1Wrestler.color);
  txtL('STA', 8, 56, C.GRAY, 1);
  
  // Clock
  txt('P' + period, W/2, 16, C.GOLD, 1);
  txt('' + moveClock, W/2, 40, C.YELLOW, 3);
  
  // P2
  txtR(p2Wrestler.name, W - 8, 16, p2Wrestler.color, 1);
  txtR('' + p2Score, W - 8, 36, C.WHITE, 2);
  rect(W - 128, 44, 120, 6, C.DARK_GRAY);
  const p2Fill = Math.floor(p2Stamina * 1.2);
  rect(W - 128, 44, 120, 6, C.DARK_GRAY);
  rect(W - 8 - p2Fill, 44, p2Fill, 6, p2Wrestler.color);
  txtR('STA', W - 8, 56, C.GRAY, 1);
  
  // Round
  txt('R' + (tournamentRound + 1), W/2, 56, C.GRAY, 1);
}

// TITLE SCREEN
function updateTitle() {
  titleAnim++;
  const t = consumeTouch();
  if (t === 'start' || keys['Enter'] || keys['Space']) {
    initAudio(); sfxSelect(); state = STATES.SELECT; cursorPos = 0;
    keys['Enter'] = false; keys['Space'] = false;
  }
}

function drawTitle() {
  rect(0, 0, W, H, C.BLACK);
  touchAreas = [];
  
  // Stars
  stars.forEach(s => {
    s.b += 0.02;
    const br = Math.sin(s.b) * 0.5 + 0.5;
    if (br > 0.3) rect(s.x, s.y, s.s, s.s, br > 0.7 ? C.GOLD : C.LIGHT_GRAY);
  });
  
  // USA stripes at top
  for (let i = 0; i < 7; i++) {
    rect(0, 80 + i * 8, W, 4, i % 2 === 0 ? C.RED : C.WHITE);
  }
  // Blue field
  rect(0, 80, 80, 56, C.NAVY);
  // Stars in blue field
  txt('*', 20, 100, C.WHITE, 1);
  txt('*', 40, 100, C.WHITE, 1);
  txt('*', 60, 100, C.WHITE, 1);
  txt('*', 20, 115, C.WHITE, 1);
  txt('*', 40, 115, C.WHITE, 1);
  txt('*', 60, 115, C.WHITE, 1);
  txt('*', 30, 108, C.WHITE, 1);
  txt('*', 50, 108, C.WHITE, 1);
  
  // Wrestling mat at bottom
  rect(20, 420, W - 40, 180, C.MAT_BLUE);
  ctx.beginPath(); ctx.arc(W/2, 510, 70, 0, Math.PI * 2); ctx.strokeStyle = C.WHITE; ctx.lineWidth = 1; ctx.stroke();
  ctx.beginPath(); ctx.arc(W/2, 510, 55, 0, Math.PI * 2); ctx.strokeStyle = C.MAT_RED; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.arc(W/2, 510, 12, 0, Math.PI * 2); ctx.strokeStyle = C.WHITE; ctx.lineWidth = 1; ctx.stroke();
  outline(20, 420, W - 40, 180, C.WHITE);
  
  // Tiny wrestlers
  drawWrestler(W/2 - 25, 500, WRESTLERS[0], 1, titleAnim, 1);
  drawWrestler(W/2 + 25, 500, WRESTLERS[1], -1, titleAnim, 1);
  
  // Title
  const yOff = Math.sin(titleAnim * 0.05) * 4;
  txt('MAT', W/2, 220 + yOff, C.GOLD, 6);
  txt('KINGS', W/2, 290 + yOff, C.BRIGHT_RED, 6);
  
  // Wrestling silhouette icons
  txt('🤼', W/2 - 60, 260, C.WHITE, 2);
  txt('🤼', W/2 + 60, 260, C.WHITE, 2);
  
  // Subtitle
  txt('USA WRESTLING ARCADE', W/2, 330, C.WHITE, 1);
  txt('TECMO BOWL STYLE', W/2, 345, C.GRAY, 1);
  
  // Start button
  const by = 380;
  if (Math.floor(titleAnim / 25) % 2 === 0) {
    rect(W/2 - 80, by - 14, 160, 28, C.GOLD);
    txt('TAP TO START', W/2, by + 4, C.BLACK, 2);
  } else {
    outline(W/2 - 80, by - 14, 160, 28, C.GOLD);
    txt('TAP TO START', W/2, by + 4, C.GOLD, 2);
  }
  addTouch('start', W/2 - 80, by - 14, 160, 28);
  
  // Credits
  txt('BUILT BY ANVIL', W/2, H - 12, C.GRAY, 1);
}

// CHARACTER SELECT
function updateSelect() {
  titleAnim++;
  const t = consumeTouch();
  if (t && t.startsWith('w')) {
    const idx = parseInt(t.substring(1));
    cursorPos = idx;
    sfxSelect();
  }
  if (t === 'confirm' || keys['Enter'] || keys['Space']) {
    sfxSelect();
    p1Wrestler = WRESTLERS[cursorPos];
    tournamentOpponents = WRESTLERS.filter((_, i) => i !== cursorPos).sort(() => Math.random() - 0.5);
    tournamentRound = 0;
    p2Wrestler = tournamentOpponents[0];
    p1Score = 0; p2Score = 0; p1Stamina = 100; p2Stamina = 100;
    period = 1; moveClock = 30;
    state = STATES.VERSUS; versusTimer = 120;
    keys['Enter'] = false; keys['Space'] = false;
  }
  if (keys['ArrowUp'] || keys['KeyW']) { cursorPos = (cursorPos - 1 + WRESTLERS.length) % WRESTLERS.length; sfxSelect(); keys['ArrowUp'] = false; keys['KeyW'] = false; }
  if (keys['ArrowDown'] || keys['KeyS']) { cursorPos = (cursorPos + 1) % WRESTLERS.length; sfxSelect(); keys['ArrowDown'] = false; keys['KeyS'] = false; }
}

function drawSelect() {
  rect(0, 0, W, H, C.BLACK);
  touchAreas = [];
  
  // Header
  rect(0, 0, W, 40, C.NAVY);
  outline(0, 0, W, 40, C.GOLD);
  txt('SELECT YOUR WRESTLER', W/2, 26, C.GOLD, 2);
  
  // Wrestler list
  WRESTLERS.forEach((w, i) => {
    const y = 50 + i * 75;
    const sel = i === cursorPos;
    
    if (sel) {
      rect(10, y, W - 20, 68, w.color2);
      outline(10, y, W - 20, 68, w.color);
    } else {
      rect(10, y, W - 20, 68, C.DARK_GRAY);
      outline(10, y, W - 20, 68, C.GRAY);
    }
    
    // Wrestler sprite
    drawWrestler(50, y + 38, w, 1, titleAnim, 1);
    
    // Name
    txtL(w.name, 80, y + 16, sel ? C.WHITE : C.LIGHT_GRAY, 2);
    txtL(w.school + ', ' + w.state, 80, y + 30, C.GRAY, 1);
    
    // Stats
    const sx = 80;
    txtL('STR', sx, y + 44, C.BRIGHT_RED, 1); rect(sx + 24, y + 38, 40, 5, C.DARK_GRAY); rect(sx + 24, y + 38, w.str * 4, 5, C.BRIGHT_RED);
    txtL('SPD', sx + 70, y + 44, C.BRIGHT_BLUE, 1); rect(sx + 94, y + 38, 40, 5, C.DARK_GRAY); rect(sx + 94, y + 38, w.spd * 4, 5, C.BRIGHT_BLUE);
    txtL('TEC', sx + 140, y + 44, C.BRIGHT_GREEN, 1); rect(sx + 164, y + 38, 40, 5, C.DARK_GRAY); rect(sx + 164, y + 38, w.tec * 4, 5, C.BRIGHT_GREEN);
    txtL('STA', sx, y + 56, C.YELLOW, 1); rect(sx + 24, y + 50, 40, 5, C.DARK_GRAY); rect(sx + 24, y + 50, w.sta * 4, 5, C.YELLOW);
    
    // Moves
    txtL(w.moves.map(m => m.icon).join(' '), sx + 70, y + 56, C.LIGHT_GRAY, 1);
    
    addTouch('w' + i, 10, y, W - 20, 68);
  });
  
  // Confirm button
  const by = H - 50;
  rect(W/2 - 90, by, 180, 40, C.GOLD);
  txt('TAP TO SELECT', W/2, by + 25, C.BLACK, 2);
  addTouch('confirm', W/2 - 90, by, 180, 40);
}

// VERSUS
function updateVersus() {
  versusTimer--;
  titleAnim++;
  if (versusTimer <= 0) { state = STATES.MATCH_INTRO; matchIntroTimer = 90; sfxWhistle(); }
}

function drawVersus() {
  rect(0, 0, W, H, C.BLACK);
  touchAreas = [];
  
  // P1
  drawWrestler(W/2, 200, p1Wrestler, 1, titleAnim, 3);
  txt(p1Wrestler.name, W/2, 140, p1Wrestler.color, 2);
  txt(p1Wrestler.school + ', ' + p1Wrestler.state, W/2, 160, C.LIGHT_GRAY, 1);
  
  // VS
  const flash = versusTimer > 60 || Math.floor(versusTimer / 5) % 2 === 0;
  if (flash) txt('VS', W/2, 290, C.GOLD, 4);
  
  // P2
  drawWrestler(W/2, 430, p2Wrestler, -1, titleAnim, 3);
  txt(p2Wrestler.name, W/2, 370, p2Wrestler.color, 2);
  txt(p2Wrestler.school + ', ' + p2Wrestler.state, W/2, 390, C.LIGHT_GRAY, 1);
  
  // Round
  txt('ROUND ' + (tournamentRound + 1), W/2, 550, C.GOLD, 2);
  
  // USA stripe bar
  for (let i = 0; i < W; i += 20) {
    rect(i, 510, 10, 8, C.RED);
    rect(i + 10, 510, 10, 8, C.WHITE);
  }
  rect(W/2 - 40, 510, 80, 8, C.NAVY);
}

// MATCH INTRO
function updateMatchIntro() {
  matchIntroTimer--;
  if (matchIntroTimer <= 0) { state = STATES.MOVE_SELECT; p1MoveSelect = 0; moveClock = 30; moveClockTimer = 0; }
}

function drawMatchIntro() {
  drawMatchBG();
  rect(0, 0, W, H, 'rgba(0,0,0,0.6)');
  touchAreas = [];
  if (matchIntroTimer > 60) {
    txt('PERIOD ' + period, W/2, H/2, C.GOLD, 3);
  } else {
    txt('WRESTLE!', W/2, H/2, C.BRIGHT_RED, 4);
  }
}

function drawMatchBG() {
  drawMat();
  drawScoreboard();
}

// MOVE SELECT
function updateMoveSelect() {
  titleAnim++;
  const t = consumeTouch();
  if (t && t.startsWith('move')) {
    p1MoveSelect = parseInt(t.substring(4));
    sfxSelect();
    resolveMove(p1MoveSelect);
    return;
  }
  if (keys['ArrowUp'] || keys['KeyW']) { p1MoveSelect = (p1MoveSelect - 1 + 4) % 4; sfxSelect(); keys['ArrowUp'] = false; keys['KeyW'] = false; }
  if (keys['ArrowDown'] || keys['KeyS']) { p1MoveSelect = (p1MoveSelect + 1) % 4; sfxSelect(); keys['ArrowDown'] = false; keys['KeyS'] = false; }
  
  moveClockTimer++;
  if (moveClockTimer >= 60) {
    moveClockTimer = 0; moveClock--;
    if (moveClock <= 0) { resolveMove(p1MoveSelect); return; }
  }
  if (keys['Enter'] || keys['Space']) { resolveMove(p1MoveSelect); keys['Enter'] = false; keys['Space'] = false; }
}

function resolveMove(p1Idx) {
  p1Move = p1Wrestler.moves[p1Idx];
  const aiIdx = Math.floor(Math.random() * 4);
  p2Move = p2Wrestler.moves[aiIdx];
  state = STATES.MOVE_ANIM; animTimer = 60; animPhase = 'clash'; takedownAnim = 0;
}

function updateMoveAnim() {
  animTimer--;
  if (animPhase === 'clash') {
    shakeTimer = 3; shakeX = (Math.random() - 0.5) * 4; shakeY = (Math.random() - 0.5) * 4;
    if (animTimer <= 0) {
      animPhase = 'execute'; animTimer = 45; takedownAnim = 0;
      const outcome = resolveOutcome(p1Move, p2Move, p1Wrestler, p2Wrestler);
      resultText = outcome.text;
      if (outcome.winner === 'p1') { p1Score += outcome.points; p2Stamina = Math.max(0, p2Stamina - outcome.damage); sfxTakedown(); }
      else if (outcome.winner === 'p2') { p2Score += outcome.points; p1Stamina = Math.max(0, p1Stamina - outcome.damage); sfxHit(); }
      else { sfxEscape(); }
    }
  } else if (animPhase === 'execute') {
    takedownAnim++;
    if (animTimer <= 0) { animPhase = 'result'; animTimer = 60; resultTimer = 60; }
  } else if (animPhase === 'result') {
    if (animTimer <= 0) {
      if (p1Stamina <= 0 || p2Stamina <= 0) {
        sfxPin();
        if (p2Stamina <= 0) { p1Score += 6; resultText = 'FALL! ' + p1Wrestler.name + ' PINS!'; }
        else { p2Score += 6; resultText = 'FALL! ' + p2Wrestler.name + ' PINS!'; }
        state = STATES.MATCH_END; matchEndTimer = 150; return;
      }
      if (moveClock <= 0) { state = STATES.PERIOD_END; periodEndTimer = 90; return; }
      state = STATES.MOVE_SELECT; p1MoveSelect = 0;
    }
  }
}

function resolveOutcome(m1, m2, w1, w2) {
  let adv = 0;
  if (m1.type === 'defense' && m2.type === 'takedown') adv = 2;
  else if (m1.type === 'takedown' && m2.type === 'defense') adv = -2;
  else if (m1.type === 'takedown' && m2.type === 'throw') adv = 2;
  else if (m1.type === 'throw' && m2.type === 'takedown') adv = -2;
  else if (m1.type === 'throw' && m2.type === 'pin') adv = 2;
  else if (m1.type === 'pin' && m2.type === 'throw') adv = -2;
  else if (m1.type === 'pin' && m2.type === 'defense') adv = 2;
  else if (m1.type === 'defense' && m2.type === 'pin') adv = -2;
  
  if (m1.type === 'takedown') adv += (w1.str - w2.spd) * 0.3;
  else if (m1.type === 'throw') adv += (w1.tec - w2.str) * 0.3;
  else if (m1.type === 'pin') adv += (w1.tec - w2.spd) * 0.3;
  else if (m1.type === 'defense') adv += (w1.spd - w2.str) * 0.3;
  
  adv += (m1.power - m2.power) * 0.2;
  adv += (Math.random() - 0.5) * 2;
  adv += (p1Stamina - p2Stamina) * 0.02;
  
  if (adv > 1.5) return { winner: 'p1', points: m1.pts, damage: 15, text: m1.name + '!' };
  if (adv > 0.5) return { winner: 'p1', points: 1, damage: 8, text: m1.name + ' - partial!' };
  if (adv > -0.5) return { winner: 'none', points: 0, damage: 0, text: 'STALEMATE!' };
  if (adv > -1.5) return { winner: 'p2', points: 1, damage: 8, text: m2.name + ' - partial!' };
  return { winner: 'p2', points: m2.pts, damage: 15, text: m2.name + '!' };
}

function drawMoveSelect() {
  drawMatchBG();
  touchAreas = [];
  
  // Wrestlers on mat
  drawWrestler(W/2 - 40, H/2 + 10, p1Wrestler, 1, titleAnim, 2);
  drawWrestler(W/2 + 40, H/2 + 10, p2Wrestler, -1, titleAnim, 2);
  
  // Move selection panel
  rect(0, H - 140, W, 140, C.BLACK);
  outline(0, H - 140, W, 140, C.GOLD);
  txt('PICK YOUR MOVE', W/2, H - 130, C.GOLD, 1);
  
  // 2x2 grid of move buttons
  p1Wrestler.moves.forEach((m, i) => {
    const col = i % 2;
    const row = Math.floor(i / 2);
    const bx = 10 + col * 175;
    const by = H - 118 + row * 52;
    const bw = 168;
    const bh = 46;
    const sel = i === p1MoveSelect;
    
    const typeColor = m.type === 'takedown' ? C.BRIGHT_RED : m.type === 'throw' ? C.BRIGHT_BLUE : m.type === 'pin' ? C.BRIGHT_GREEN : C.YELLOW;
    
    if (sel) {
      rect(bx, by, bw, bh, typeColor);
      outline(bx, by, bw, bh, C.WHITE);
    } else {
      rect(bx, by, bw, bh, C.DARK_GRAY);
      outline(bx, by, bw, bh, typeColor);
    }
    
    txt(m.icon, bx + 20, by + 18, sel ? C.BLACK : typeColor, 2);
    txtL(m.name, bx + 40, by + 14, sel ? C.BLACK : C.WHITE, 1);
    txt(m.type.toUpperCase(), bx + 100, by + 30, sel ? C.BLACK : C.GRAY, 1);
    
    addTouch('move' + i, bx, by, bw, bh);
  });
}

function drawMoveAnim() {
  drawMatchBG();
  touchAreas = [];
  
  if (shakeTimer > 0) { ctx.save(); ctx.translate(shakeX, shakeY); shakeTimer--; }
  
  if (animPhase === 'clash') {
    const sk = Math.sin(animTimer * 0.5) * 4;
    drawWrestler(W/2 - 35 + sk, H/2 + 10, p1Wrestler, 1, animTimer, 2);
    drawWrestler(W/2 + 35 - sk, H/2 + 10, p2Wrestler, -1, animTimer, 2);
    txt(p1Move.name, W/2 - 80, H/2 - 40, p1Wrestler.color, 1);
    txt(p2Move.name, W/2 + 80, H/2 - 40, p2Wrestler.color, 1);
    if (animTimer < 15) txt('!!', W/2, H/2 - 10, C.GOLD, 3);
  } else if (animPhase === 'execute') {
    const prog = takedownAnim / 45;
    const p1Wins = resultText.includes(p1Wrestler.moves[0].name) || resultText.includes(p1Wrestler.moves[1].name) || resultText.includes(p1Wrestler.moves[2].name) || resultText.includes(p1Wrestler.moves[3].name);
    if (p1Wins) {
      drawWrestler(W/2, H/2 + 10 - prog * 5, p1Wrestler, 1, 0, 2);
      if (prog > 0.3) drawWrestlerDown(W/2 + 30, H/2 + 15 + prog * 15, p2Wrestler, 1, 2);
      else drawWrestler(W/2 + 40, H/2 + 10 + prog * 20, p2Wrestler, -1, 0, 2);
    } else if (resultText === 'STALEMATE!') {
      drawWrestler(W/2 - 35 - prog * 20, H/2 + 10, p1Wrestler, 1, 0, 2);
      drawWrestler(W/2 + 35 + prog * 20, H/2 + 10, p2Wrestler, -1, 0, 2);
    } else {
      drawWrestler(W/2, H/2 + 10 - prog * 5, p2Wrestler, -1, 0, 2);
      if (prog > 0.3) drawWrestlerDown(W/2 - 30, H/2 + 15 + prog * 15, p1Wrestler, -1, 2);
      else drawWrestler(W/2 - 40, H/2 + 10 + prog * 20, p1Wrestler, 1, 0, 2);
    }
  } else if (animPhase === 'result') {
    drawWrestler(W/2 - 35, H/2 + 10, p1Wrestler, 1, 0, 2);
    drawWrestler(W/2 + 35, H/2 + 10, p2Wrestler, -1, 0, 2);
    const bc = resultText.includes('!') && !resultText.includes('STALEMATE') ? C.GOLD : C.LIGHT_GRAY;
    rect(W/2 - 90, H/2 - 40, 180, 24, C.BLACK); outline(W/2 - 90, H/2 - 40, 180, 24, bc);
    txt(resultText, W/2, H/2 - 24, bc, 1);
    if (resultTimer > 30 && Math.floor(resultTimer / 5) % 2 === 0) txt('+2', W/2 - 80, H/2 - 15, C.GOLD, 1);
    resultTimer--;
  }
  
  if (shakeTimer >= 0) ctx.restore();
}

// PERIOD END
function updatePeriodEnd() {
  periodEndTimer--;
  if (periodEndTimer <= 0) {
    period++;
    if (period > 3) {
      state = STATES.MATCH_END; matchEndTimer = 150;
      if (p1Score > p2Score) resultText = p1Wrestler.name + ' WINS BY DECISION!';
      else if (p2Score > p1Score) resultText = p2Wrestler.name + ' WINS BY DECISION!';
      else resultText = 'DRAW!';
    } else {
      moveClock = 30; moveClockTimer = 0;
      state = STATES.MATCH_INTRO; matchIntroTimer = 90; sfxWhistle();
    }
  }
}

function drawPeriodEnd() {
  drawMatchBG();
  rect(0, 0, W, H, 'rgba(0,0,0,0.7)');
  touchAreas = [];
  sfxBuzz();
  txt('END OF PERIOD ' + period, W/2, H/2 - 30, C.GOLD, 2);
  txt(p1Wrestler.name + ': ' + p1Score + '  ' + p2Wrestler.name + ': ' + p2Score, W/2, H/2 + 10, C.WHITE, 1);
}

// MATCH END
function updateMatchEnd() {
  matchEndTimer--;
  if (matchEndTimer <= 0) {
    if (p1Score > p2Score) {
      tournamentRound++;
      if (tournamentRound >= tournamentOpponents.length) { state = STATES.TOURNAMENT_WIN; return; }
      p2Wrestler = tournamentOpponents[tournamentRound];
      p1Score = 0; p2Score = 0; p1Stamina = 100; p2Stamina = 100;
      period = 1; moveClock = 30; state = STATES.VERSUS; versusTimer = 120;
    } else { state = STATES.GAME_OVER; }
  }
}

function drawMatchEnd() {
  drawMatchBG();
  rect(0, 0, W, H, 'rgba(0,0,0,0.7)');
  touchAreas = [];
  const winner = p1Score > p2Score ? p1Wrestler : p2Wrestler;
  const fl = Math.floor(matchEndTimer / 8) % 2 === 0;
  txt(resultText, W/2, H/2 - 30, fl ? C.GOLD : C.YELLOW, 2);
  txt(winner.name + ' WINS!', W/2, H/2 + 10, winner.color, 2);
  txt(p1Wrestler.name + ': ' + p1Score + '  ' + p2Wrestler.name + ': ' + p2Score, W/2, H/2 + 40, C.WHITE, 1);
}

// TOURNAMENT WIN
function drawTournamentWin() {
  rect(0, 0, W, H, C.BLACK);
  touchAreas = [];
  const t = titleAnim++;
  for (let i = 0; i < 8; i++) {
    const px = Math.sin(t * 0.02 + i) * 120 + W/2;
    const py = Math.cos(t * 0.03 + i * 2) * 100 + H/2;
    rect(px, py, 6, 6, [C.GOLD, C.BRIGHT_RED, C.BRIGHT_BLUE, C.WHITE, C.YELLOW, C.BRIGHT_GREEN, C.RED, C.NAVY][i]);
  }
  
  // USA stripes
  for (let i = 0; i < W; i += 16) { rect(i, 180, 8, 8, C.RED); rect(i + 8, 180, 8, 8, C.WHITE); }
  rect(W/2 - 50, 180, 100, 8, C.NAVY);
  
  txt('CHAMPION!', W/2, 80, C.GOLD, 4);
  txt(p1Wrestler.name, W/2, 140, p1Wrestler.color, 3);
  txt('MAT KING', W/2, 210, C.YELLOW, 3);
  
  drawWrestler(W/2, 300, p1Wrestler, 1, t, 3);
  
  // Trophy
  rect(W/2 - 10, 370, 20, 15, C.GOLD);
  rect(W/2 - 5, 385, 10, 8, C.GOLD);
  rect(W/2 - 15, 365, 30, 8, C.GOLD);
  
  if (Math.floor(t / 25) % 2 === 0) {
    rect(W/2 - 80, H - 60, 160, 40, C.GOLD);
    txt('TAP TO CONTINUE', W/2, H - 36, C.BLACK, 1);
  }
  addTouch('restart', W/2 - 80, H - 60, 160, 40);
  
  const tch = consumeTouch();
  if (tch === 'restart' || keys['Enter'] || keys['Space']) { state = STATES.TITLE; keys['Enter'] = false; keys['Space'] = false; }
}

// GAME OVER
function drawGameOver() {
  rect(0, 0, W, H, C.BLACK);
  touchAreas = [];
  txt('ELIMINATED', W/2, 140, C.BRIGHT_RED, 3);
  txt(p1Wrestler.name + ' LOSES', W/2, 200, C.LIGHT_GRAY, 2);
  txt('ROUND ' + (tournamentRound + 1) + ' OF ' + tournamentOpponents.length, W/2, 240, C.GRAY, 1);
  txt('FINAL: ' + p1Score + ' - ' + p2Score, W/2, 280, C.WHITE, 2);
  
  if (Math.floor(titleAnim++ / 25) % 2 === 0) {
    rect(W/2 - 80, H - 60, 160, 40, C.BRIGHT_RED);
    txt('TAP TO RETRY', W/2, H - 36, C.WHITE, 1);
  }
  addTouch('restart', W/2 - 80, H - 60, 160, 40);
  
  const tch = consumeTouch();
  if (tch === 'restart' || keys['Enter'] || keys['Space']) { state = STATES.TITLE; keys['Enter'] = false; keys['Space'] = false; }
}

// MAIN LOOP
function update() {
  switch (state) {
    case STATES.TITLE: updateTitle(); break;
    case STATES.SELECT: updateSelect(); break;
    case STATES.VERSUS: updateVersus(); break;
    case STATES.MATCH_INTRO: updateMatchIntro(); break;
    case STATES.MOVE_SELECT: updateMoveSelect(); break;
    case STATES.MOVE_ANIM: updateMoveAnim(); break;
    case STATES.PERIOD_END: updatePeriodEnd(); break;
    case STATES.MATCH_END: updateMatchEnd(); break;
  }
}

function draw() {
  touchAreas = [];
  ctx.fillStyle = C.BLACK; ctx.fillRect(0, 0, W, H);
  switch (state) {
    case STATES.TITLE: drawTitle(); break;
    case STATES.SELECT: drawSelect(); break;
    case STATES.VERSUS: drawVersus(); break;
    case STATES.MATCH_INTRO: drawMatchIntro(); break;
    case STATES.MOVE_SELECT: drawMoveSelect(); break;
    case STATES.MOVE_ANIM: drawMoveAnim(); break;
    case STATES.PERIOD_END: drawPeriodEnd(); break;
    case STATES.MATCH_END: drawMatchEnd(); break;
    case STATES.TOURNAMENT_WIN: drawTournamentWin(); break;
    case STATES.GAME_OVER: drawGameOver(); break;
  }
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
titleAnim = 0;
gameLoop();
</script>
